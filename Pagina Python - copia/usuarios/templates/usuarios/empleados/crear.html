{% extends 'usuarios/base.html' %}

{% block content %}

<h2>Crear Empleado</h2>

<form method="POST">
{% csrf_token %}

<label>Nombre</label>
<input type="text" name="nom_emple">

<label>Teléfono</label>
<input type="text" name="tel_emple">

<label>Correo</label>
<input type="email" name="correo_emple">

<label>Dirección</label>
<input type="text" name="dir_emple">

<label>RH</label>
<input type="text" name="rh_emple">

<label>Fecha Nacimiento</label>
<input type="date" name="fecha_naci_emple">

<label>Tipo Identificación</label>
<input type="text" name="tipo_ident">

<label>Número Identificación</label>
<input type="text" name="num_ident">

<label>Fecha Ingreso</label>
<input type="date" name="fecha_ing_emple">

<label>Salario</label>
<input type="number" step="0.01" name="salari_emple">

<label>Estado</label>
<input type="text" name="estado_emple">

<label>Usuario</label>
<select name="id_usuario_fk_emple">

{% for usuario in usuarios %}
<option value="{{ usuario.id_usuario }}">
{{ usuario.username }}
</option>
{% endfor %}

</select>

<button type="submit">Guardar</button>

</form>

{% endblock %}
