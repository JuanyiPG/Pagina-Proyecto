{% extends 'usuarios/base.html' %}

{% block content %}

<h2>Editar Usuario</h2>

<form method="POST">
{% csrf_token %}

<label>Username</label>
<input type="text" name="username" value="{{usuario.username}}">

<br><br>

<label>Contraseña</label>
<input type="text" name="contrasena" value="{{usuario.contrasena}}">

<br><br>

<label>Rol</label>

<select name="id_rol">

{% for rol in roles %}

<option value="{{rol.id_rol}}"
{% if rol.id_rol == usuario.id_rol_fk.id_rol %}
selected
{% endif %}
>

{{rol.nom_rol}}

</option>

{% endfor %}

</select>

<br><br>

<button type="submit">Actualizar</button>

</form>

{% endblock %}
