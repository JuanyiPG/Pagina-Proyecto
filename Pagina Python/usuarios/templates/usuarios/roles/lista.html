{% extends 'usuarios/base.html' %}

{% block content %}

<h2>Lista de Roles</h2>

<a href="{% url 'crear_rol' %}">Crear Rol</a>

<table border="1">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Acciones</th>
</tr>

{% for rol in roles %}
<tr>
<td>{{ rol.id_rol }}</td>
<td>{{ rol.nom_rol }}</td>
<td>
<a href="{% url 'editar_rol' id=rol.id_rol %}">Editar</a>
<a href="{% url 'eliminar_rol' id=rol.id_rol %}">Eliminar</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
