{% extends 'usuarios/base.html' %}

{% block content %}

<h2>Lista de Roles</h2>

<a href="/roles/crear/">Crear Rol</a>

<table border="1">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Acciones</th>
</tr>

{% for rol in roles %}
<tr>
<td>{{ rol.id_rol }}</td>
<td>{{ rol.nom_rol }}</td>
<td>
<a href="/roles/editar/{{rol.id_rol}}/">Editar</a>
<a href="/roles/eliminar/{{rol.id_rol}}/">Eliminar</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
