{% extends 'usuarios/base.html' %}

{% block content %}

<h2>Crear Cliente</h2>

<form method="POST">
{% csrf_token %}

<label>Nombre</label>
<input type="text" name="nom_clien">

<label>Dirección</label>
<input type="text" name="dir_clien">

<label>Teléfono</label>
<input type="text" name="tel_clien">

<label>Correo</label>
<input type="email" name="correo_clien">

<label>Usuario</label>
<select name="id_usuario_fk_clien">

{% for usuario in usuarios %}
<option value="{{ usuario.id_usuario }}">
{{ usuario.username }}
</option>
{% endfor %}

</select>

<button type="submit">Guardar</button>

</form>

{% endblock %}
