<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxy Fashion - Personalizador 3D</title>
    <style>
        body { margin: 0; background-color: #f0f0f0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #container3d { width: 100vw; height: 100vh; }

        /* Panel de Controles */
        #ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10; width: 260px;
        }

        h2 { margin: 0 0 15px 0; font-size: 20px; color: #1a1a1a; text-align: center; }
        label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 5px; color: #444; }

        /* Inputs y Botones */
        .btn-upload {
            border: 2px solid #333; color: #333; background: white;
            padding: 10px; border-radius: 8px; font-weight: bold;
            display: block; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .btn-upload:hover { background: #333; color: white; }

        input[type="file"] { display: none; }
        input[type="color"] { width: 100%; height: 40px; border: none; cursor: pointer; background: none; }

        .btn-action {
            width: 100%; padding: 12px; margin-top: 10px; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-save { background-color: #28a745; color: white; }
        .btn-cancel { background-color: #dc3545; color: white; }
        .btn-action:hover { opacity: 0.8; }

        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; }
    </style>
</head>
<body>

<div id="loading">Cargando experiencia 3D...</div>

<div id="ui-panel">
    <h2>Luxy Fashion</h2>

    <label>1. Color de la Prenda:</label>
    <input type="color" id="colorPicker" value="#ffffff">

    <label>2. Sube tu Logo:</label>
    <label class="btn-upload" for="imageInput">Cargar Imagen</label>
    <input type="file" id="imageInput" accept="image/*">

    <label>3. Tamaño del Estampado:</label>
    <input type="range" id="sizeSlider" min="1" max="150" value="20" style="width:100%;">

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">

    <button id="btnCancel" class="btn-action btn-cancel">Cancelar Ubicación</button>
    <button id="btnSave" class="btn-action btn-save">Guardar Diseño</button>
</div>

<div id="container3d"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module" src="/js/main.js"></script>

</body>
</html>
