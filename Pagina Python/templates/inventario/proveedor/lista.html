{% extends 'usuarios/base.html' %}
{% block contenido %}
<div class="container-wide">
    <h2>🤝 Gestión de Proveedores</h2>
    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div><label>Nombre del Proveedor</label><input type="text" name="nom_provee" required></div>
                <div><label>Fecha de Ingreso</label><input type="date" name="fech_ingre" required></div>
                <div><label>Teléfono de Contacto</label><input type="text" name="num_tel" required></div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-save">🤝 Agregar Proveedor</button>
            </div>
        </form>
    </div>
    <table>
        <thead><tr><th>ID</th><th>Nombre</th><th>Ingreso</th><th>Teléfono</th><th>Acciones</th></tr></thead>
        <tbody>
            {% for p in proveedor %}
            <tr>
                <td>{{ p.id_provee }}</td>
                <td><strong>{{ p.nom_provee }}</strong></td>
                <td>{{ p.fech_ingre }}</td>
                <td>{{ p.num_tel }}</td>
                <td>
                   
                        <a href="{% url 'inventario:editar_provee' p.id_provee %}" class="btn-edit">Editar</a>
                        <a href="{% url 'inventario:eliminar_provee' p.id_provee %}" class="btn-delete">Borrar</a>

                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
