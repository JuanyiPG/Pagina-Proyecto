{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Luxy Fashion</title>
    <link rel="stylesheet" href="{% static 'css/formularios/estilo.css' %}">
</head>

<body>

<nav class="sidebar">
    <h1>Luxy Fashion</h1>
        
    <div class="menu">
        <a href="{% url 'usuarios:estadisticas_admin' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-bar-chart"></i>
            <span>Estadísticas</span>
        </a>

        <a href="{% url 'usuarios:lista_roles' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-shield-lock"></i>
            <span>Roles</span>
        </a>

        <a href="{% url 'usuarios:lista_usuarios' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-people"></i>
            <span>Usuarios</span>
        </a>

        <a href="{% url 'usuarios:lista_empleados' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-person-badge"></i>
            <span>Empleados</span>
        </a>

        <a href="{% url 'usuarios:lista_clientes' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-person-lines-fill"></i>
            <span>Clientes</span>
        </a>

        <a href="{% url 'ventas:lista_producto_admin' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-box-seam"></i>
            <span>Productos</span>
        </a>

        <a href="{% url 'inventario:lista_provee' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-truck"></i>
            <span>Proveedores</span>
        </a>

        <a href="{% url 'inventario:lista_estampado' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-palette"></i>
            <span>Estampados</span>
        </a>

        <a href="{% url 'inventario:lista_mmtp' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-layers"></i>
            <span>Materia Prima</span>
        </a>

        <a href="{% url 'ventas:lista_abono' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-cash-stack"></i>
            <span>Abonos</span>
        </a>
        <a href="{% url 'ventas:lista_pedido' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-box-seam"></i>
            <span>Pedidos</span>
        </a>
    </div>

    <div style="position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center;">
        <form action="{% url 'usuarios:logout' %}" method="POST">
            {% csrf_token %}
            <button type="submit"
                style="
                    background: linear-gradient(135deg, #800020, #6a0f2e);
                    border: none;
                    color: white;
                    padding: 12px 25px;
                    border-radius: 10px;
                    font-weight: bold;
                    letter-spacing: 1px;
                    cursor: pointer;
                    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
                    transition: all 0.3s ease;
                "
                onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 10px 20px rgba(0,0,0,0.3)'"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 6px 15px rgba(0,0,0,0.2)'"
            >
                ⏻ Cerrar sesión
            </button>
        </form>
    </div>
</nav>

<div class="main-content">
    <div class="header">
        <h2>Consola de administración</h2>
    </div>
    
    <hr>

    {% block content %}
    {% endblock %}
</div>

<script>
    if (window.history.replaceState) {
        window.history.replaceState(null, null, window.location.href);
    }
</script>

</body>
</html>
