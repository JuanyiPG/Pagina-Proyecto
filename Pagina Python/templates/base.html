{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Luxy Fashion</title>
    <link rel="stylesheet" href="{% static 'css/formularios/estilo.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
   <style>
    body { 
        display: flex; 
        min-height: 100vh; 
        background-color: #f8f9fa; 
        margin: 0; 
        padding: 0;
    }

    .sidebar { 
        width: 260px; 
        position: fixed; 
        height: 100vh; 
        background: #7e1a3f; /* Aseguramos que el color sea consistente */
        z-index: 1000;
    }

    .main-content { 
        flex: 1; 
        margin-left: 260px; /* Este debe ser exacto al ancho de la sidebar */
        padding: 30px; 
        min-height: 100vh;
        background-color: #f8f9fa; /* Color de fondo para el área de trabajo */
        display: flex;
        flex-direction: column;
    }

    /* Quita cualquier margen extra que Bootstrap pueda estar metiendo */
    .container-wide, .container-fluid {
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
    }
</style>
</head>
<body>

<nav class="sidebar">
    <h1>Luxy Fashion</h1>
    <div class="menu">
        <a href="{% url 'usuarios:estadisticas_admin' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-bar-chart"></i><span>Estadísticas</span>
        </a>
        <a href="{% url 'usuarios:lista_roles' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-shield-lock"></i><span>Roles</span>
        </a>
        <a href="{% url 'usuarios:lista_usuarios' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-people"></i><span>Usuarios</span>
        </a>
        <a href="{% url 'usuarios:lista_empleados' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-person-badge"></i><span>Empleados</span>
        </a>
        <a href="{% url 'usuarios:lista_clientes' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-person-lines-fill"></i><span>Clientes</span>
        </a>
        <a href="{% url 'ventas:lista_producto_admin' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-box-seam"></i><span>Productos</span>
        </a>
        <a href="{% url 'inventario:lista_provee' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-truck"></i><span>Proveedores</span>
        </a>
        <a href="{% url 'inventario:lista_estampado' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-palette"></i><span>Estampados</span>
        </a>
        <a href="{% url 'inventario:lista_mmtp' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-layers"></i><span>Materia Prima</span>
        </a>
        <a href="{% url 'ventas:lista_abono' %}" class="nav-link d-flex align-items-center gap-2">
            <i class="bi bi-cash-stack"></i><span>Abonos</span>
        </a>
    </div>

    <div style="position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center;">
        <form action="{% url 'usuarios:logout' %}" method="POST">
            {% csrf_token %}
            <button type="submit" style="background: linear-gradient(135deg, #800020, #6a0f2e); border: none; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer;">
                ⏻ Cerrar sesión
            </button>
        </form>
    </div>
</nav>

<main class="main-content">
    <div class="header">
        <h2 style="font-size: 24px; color: #333;">Consola de administración</h2>
    </div>

    {% block content %}
    {% endblock %}
</main>

<script>
    if (window.history.replaceState) {
        window.history.replaceState(null, null, window.location.href);
    }
</script>

</body>
</html>
