{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Luxy Fashion</title>
    <link rel="stylesheet" href="{% static 'css/formularios/estilo.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="sidebar">
        <h1>Luxy Fashion</h1>
        <div class="menu">
            <a href="{% url 'usuarios:lista_roles' %}"> Roles</a>
            <a href="{% url 'usuarios:lista_usuarios' %}"> Usuarios</a>
            <a href="{% url 'usuarios:lista_empleados' %}"> Empleados</a>
            <a href="{% url 'usuarios:lista_clientes' %}"> Clientes</a>
            <a href="{% url 'ventas:lista_producto_admin' %}">Productos</a>
            <a href="{% url 'inventario:lista_provee' %}">Proveedores</a>
            <a href="{% url 'inventario:lista_estampado' %}"> Estampados</a>
            <a href="{% url 'inventario:lista_mmtp' %}">Materia Prima</a>
            <a href="{% url 'ventas:lista_abono' %}">Abonos</a>
        </div>
        <div class="logout-box" style="margin-top: auto; padding: 20px;">
            <form action="{% url 'usuarios:logout' %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="btn-cancel" style="width:100%;">Cerrar sesión</button>
            </form>
        </div>
    </nav>

    <div class="main-content">
        <div class="header">
            <h2>Consola de Administración</h2>
        </div>
        <hr>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
