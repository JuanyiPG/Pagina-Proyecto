{% extends 'base.html' %}
{% load static %}

{% block contenido %} <style>
    body { font-family: Arial; background: #f4eeee; margin: 0; }
    
    main { padding: 40px; } /* Ya no necesitas margin-top: 100px si base.html ya tiene menú */

    .con-pro-cli {
        display: flex;
        gap: 30px;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        margin-top: 20px;
    }

    .imgs-of-produc {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .imgs-of-produc img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        border: 1px solid #eee;
    }

    .img-prin-pro img {
        width: 400px;
        height: 450px;
        object-fit: cover;
        border-radius: 12px;
    }

    .form-pro {
        flex: 1;
        padding-left: 20px;
    }

    /* Estilos de botones de tallas y colores */
    .btn-talla {
        display: inline-block;
        padding: 10px 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin-right: 5px;
        cursor: pointer;
    }

    input[type="radio"]:checked + .btn-talla {
        background: black;
        color: white;
        border-color: black;
    }

    .contenedor-opciones-color {
        display: flex;
        gap: 10px;
        margin-top: 15px;
    }

    .color-option {
        display: inline-block;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 2px solid #ddd;
        cursor: pointer;
    }

    input[type="radio"]:checked + .color-option {
        border-color: black;
    }

    .readonly input {
        border: none;
        background: transparent;
        font-weight: bold;
        outline: none;
    }
</style>

<div class="con-pro-cli">
    
    <div class="imgs-of-produc">
        <img id="img1" src="{{ producto.imagen_product.url }}" alt="Vista 1">
        <img id="img2" src="{{ producto.imagen_product.url }}" alt="Vista 2">
        <img id="img3" src="{{ producto.imagen_product.url }}" alt="Vista 3">
    </div>

    <div class="img-prin-pro">
        {% if producto.imagen_product %}
            <img src="{{ producto.imagen_product.url }}" alt="{{ producto.nom_produc }}">
        {% else %}
            <img src="{% static 'img/default.jpg' %}" alt="No image">
        {% endif %}
    </div>

    <div class="form-pro">
        <form action="{% url 'ventas:producto_sin_personalizar' producto.id_produc %}" method="POST">
            {% csrf_token %}

            <div class="readonly">
                <input type="text" class="nombre" name="nomPedido" value="{{ producto.nom_produc }}" readonly style="font-size: 25px; width: 100%; font-family: Georgia;">
            </div>

            <label for="valor" class="subinfo" style="font-family: Georgia; margin-top: 10px; display:block;">Valor:</label>
            <div class="readonly">
                $<input type="text" class="valor" name="valor" value="{{ producto.precio }}" readonly style="font-family: Georgia;">
            </div>

            <div style="margin-top: 15px;">
                <label style="display:block; margin-bottom: 8px; font-weight: bold;">Tallas disponibles:</label>
                {% for t in tallas %}
                    <input type="radio" name="talla" id="talla-{{t}}" value="{{t}}" style="display:none;" required>
                    <label for="talla-{{t}}" class="btn-talla">{{t}}</label>
                {% endfor %}
            </div>

            <div style="margin-top: 15px;">
                <label style="font-weight: bold;">Colores disponibles:</label>
                <div class="contenedor-opciones-color">
                    {% for c in colores %}
                        <div class="color-picker">
                            <input type="radio" name="color" id="color-{{c}}" value="{{c}}" style="display:none;" required>
                            <label for="color-{{c}}" class="color-option"
                            <div class="{% if c == 'rojo' %}bg-rojo{% elif c == 'azul' %}bg-azul{% elif c == 'blanco' %}bg-blanco{% elif c == 'gris' %}bg-gris{% else %}bg-default{% endif %}">
                            </div>
                            </label>
                        </div>
                    {% endfor %}
                </div>
            </div>

            <div style="margin-top: 20px;">
                <label for="cantidad_id" style="font-weight: bold;">Cantidad:</label>
                <input type="number" name="cantidad" id="cantidad_id" value="1" min="1" style="width: 70px; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
            </div>

            <div style="margin-top: 30px;">
                <button type="submit" style="background-color: #6a0f2e; color: white; padding: 15px 35px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;">
                    🛍️ Añadir al Carrito
                </button>
            </div>
        </form>
    </div>
</div>

<script src="{% static 'js/cliente.js' %}"></script>

{% endblock %}
