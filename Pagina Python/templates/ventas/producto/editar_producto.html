{% extends 'base.html' %}
{% load l10n %}

{% block content %}
<style>
    .main-content { padding: 15px; font-family: 'Segoe UI', sans-serif; background-color: #fcfcfc; }
    .container-wide { max-width: 750px; margin: auto; }
    
    .form-card { 
        background: white; padding: 18px; border-radius: 10px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
    }
    
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 3px; font-weight: 600; color: #444; font-size: 12px; }
    
    .form-group input, .form-group select, .form-group textarea { 
        width: 100%; padding: 8px; border: 1.5px solid #eee; border-radius: 5px; outline: none; font-size: 12px;
    }
    .form-group input:focus, .form-group select:focus { border-color: #6a0f2e; }
    .readonly-field { background-color: #f4f4f4; color: #888; cursor: not-allowed; border: 1.5px solid #ececec; }

    /* Distribución en filas compactas */
    .fila-superior { display: flex; gap: 15px; align-items: center; background: #fafafa; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
    .seccion-columnas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .bloque-variantes { display: grid; grid-template-columns: 1fr 1.2fr; gap: 12px; margin-top: 10px; }

    .btn-main { 
        background-color: #6a0f2e; color: white; border: none; padding: 10px; 
        border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 13px; width: 100%; text-transform: uppercase;
    }
    .btn-main:hover { background-color: #4d0a21; }
    .btn-action { border: none; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 10px; font-weight: bold; color: white; }
</style>

<div class="main-content">
    <div class="container-wide">
        <h2 style="text-align: center; color: #6a0f2e; margin-bottom: 15px; font-weight: 700; font-size: 18px;">EDITAR PRENDA</h2>

        <div class="form-card">
            <form action="{% url 'ventas:editar_producto' producto.pk %}" method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="fila-superior">
                    {% if producto.imagen_product %}
                        <img src="{{ producto.imagen_product.url }}" style="max-height: 50px; border-radius: 4px;">
                    {% endif %}
                    <div style="flex: 1;">
                        <label style="font-size: 11px; font-weight: bold; color: #555;">Producto</label>
                        <input type="text" class="readonly-field" name="nom_produc" value="{{ producto.nom_produc }}" readonly style="padding: 6px;">
                    </div>
                </div>

                <div class="seccion-columnas">
                    <div class="form-group">
                        <label>Género</label>
                        <select name="gen_produc">
                            <option value="Hombre" {% if producto.gen_produc == 'Hombre' %} selected {% endif %}>Hombre</option>
                            <option value="Mujer" {% if producto.gen_produc == 'Mujer' %} selected {% endif %}>Mujer</option>
                            <option value="Unisex" {% if producto.gen_produc == 'Unisex' %} selected {% endif %}>Unisex</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select name="estado_produc">
                            <option value="Nuevo" {% if producto.estado_produc == 'Nuevo' %}selected{% endif %}>Nuevo</option>
                            <option value="En Stock" {% if producto.estado_produc == 'En Stock' %}selected{% endif %}>En Stock</option>
                            <option value="Agotado" {% if producto.estado_produc == 'Agotado' %}selected{% endif %}>Agotado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Categoría</label>
                        <input type="text" class="readonly-field" name="categoria_produc" value="{{ producto.categoria_produc }}" readonly>
                    </div>
                </div>

                <div class="seccion-columnas">
                    <div class="form-group">
                        <label>Precio ($)</label>
                        <input type="number" name="precio" value="{{ producto.precio|unlocalize }}" required>
                    </div>
                    <div class="form-group">
                        <label>Días Producción</label>
                        <input type="number" name="dias_produccion" value="{{ producto.dias_produccion }}">
                    </div>
                    <div class="form-group">
                        <label>Nueva Imagen (Opcional)</label>
                        <input type="file" name="imagen_product" accept="image/*" style="padding: 4px;">
                    </div>
                </div>

                <div class="form-group">
                    <label>Descripción Corta</label>
                    <textarea name="desc_produc" rows="1" style="resize: none;">{{ producto.desc_produc }}</textarea>
                </div>

                <div class="bloque-variantes">
                    <div style="background: #fafafa; padding: 10px; border-radius: 6px; border: 1px solid #eee;">
                        <label style="color: #6a0f2e; font-weight: bold; font-size: 11px;">Tallas Disponibles</label>
                        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px;">
                            <label style="font-size: 11px;"><input type="checkbox" name="tallas_seleccionadas[]" value="S" {% if 'S' in tallas_actuales %}checked{% endif %}> S</label>
                            <label style="font-size: 11px;"><input type="checkbox" name="tallas_seleccionadas[]" value="M" {% if 'M' in tallas_actuales %}checked{% endif %}> M</label>
                            <label style="font-size: 11px;"><input type="checkbox" name="tallas_seleccionadas[]" value="L" {% if 'L' in tallas_actuales %}checked{% endif %}> L</label>
                            <label style="font-size: 11px;"><input type="checkbox" name="tallas_seleccionadas[]" value="XL" {% if 'XL' in tallas_actuales %}checked{% endif %}> XL</label>
                            <label style="font-size: 11px;"><input type="checkbox" name="tallas_seleccionadas[]" value="XXL" {% if 'XXL' in tallas_actuales %}checked{% endif %}> XXL</label>
                        </div>
                    </div>

                    <div style="background: #fafafa; padding: 10px; border-radius: 6px; border: 1px solid #eee;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                            <label style="color: #6a0f2e; font-weight: bold; font-size: 11px;">Colores</label>
                            <button type="button" class="btn-action" style="background:#555;" onclick="agregarColor()">+ Añadir</button>
                        </div>
                        <div id="contenedor-colores" style="max-height: 75px; overflow-y: auto;">
                            {% for color in colores_actuales %}
                            <div class="fila-color" style="display: flex; gap: 4px; margin-bottom: 4px;">
                                <input type="text" name="colores_nuevos[]" value="{{ color }}" required style="padding: 4px; font-size: 11px;">
                                <button type="button" onclick="eliminarColor(this)" style="background: #ff4d4d; border: none; color: white; padding: 0 8px; border-radius: 3px; cursor: pointer;">✕</button>
                            </div>
                            {% empty %}
                            <div class="fila-color" style="display: flex; gap: 4px; margin-bottom: 4px;">
                                <input type="text" name="colores_nuevos[]" placeholder="Ej: fucsia" required style="padding: 4px; font-size: 11px;">
                                <button type="button" onclick="eliminarColor(this)" style="background: #ff4d4d; border: none; color: white; padding: 0 8px; border-radius: 3px; cursor: pointer;">✕</button>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </div>

                <div style="background: #fafafa; padding: 10px; border-radius: 6px; border: 1px solid #eee; margin-top: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <label style="font-weight: 600; font-size: 11px; color:#444;">Materiales Utilizados</label>
                        <button type="button" class="btn-action" style="background:#2d6cdf;" onclick="agregarFila()">+ Insumo</button>
                    </div>
                    <div id="contenedor-materiales" style="max-height: 90px; overflow-y: auto;">
                        {% for detalle in detalles_materiales %}
                        <div class="fila-material" style="display: flex; gap: 5px; margin-bottom: 4px;">
                            <select name="material_ids[]" style="padding: 4px; font-size: 11px; flex: 2;">
                                <option value="">Seleccionar...</option>
                                {% for mat in materiales %}
                                    <option value="{{ mat.id_mmtp }}" {% if detalle.materia_prima_id == mat.id_mmtp %}selected{% endif %}>{{ mat.mat_mmtp }}</option>
                                {% endfor %}
                            </select>
                            <input type="number" name="cantidades[]" value="{{ detalle.cantidad_usada|unlocalize }}" placeholder="Cant." style="padding: 4px; font-size: 11px; flex: 1;" step="0.01">
                            <button type="button" onclick="eliminarFila(this)" style="background: #ff4d4d; border: none; color: white; padding: 0 8px; border-radius: 3px; cursor: pointer;">✕</button>
                        </div>
                        {% empty %}
                        <div class="fila-material" style="display: flex; gap: 5px; margin-bottom: 4px;">
                            <select name="material_ids[]" style="padding: 4px; font-size: 11px; flex: 2;">
                                <option value="">Seleccionar...</option>
                                {% for mat in materiales %}
                                    <option value="{{ mat.id_mmtp }}">{{ mat.mat_mmtp }}</option>
                                {% endfor %}
                            </select>
                            <input type="number" name="cantidades[]" placeholder="Cant." style="padding: 4px; font-size: 11px; flex: 1;" step="0.01">
                            <button type="button" onclick="eliminarFila(this)" style="background: #ff4d4d; border: none; color: white; padding: 0 8px; border-radius: 3px; cursor: pointer;">✕</button>
                        </div>
                        {% endfor %}
                    </div>
                </div>

                <div style="margin-top: 15px; display: flex; gap: 10px; align-items: center;">
                    <a href="{% url 'ventas:lista_producto_admin' %}" style="flex: 1; text-align: center; color: #888; text-decoration: none; font-size: 12px; font-weight: 600;">✕ Cancelar</a>
                    <button type="submit" class="btn-main" style="flex: 2;">Actualizar Producto</button>
                </div>
            </form>
        </div>
    </div>
</div>

<template id="template-color">
    <div class="fila-color" style="display: flex; gap: 4px; margin-bottom: 4px;">
        <input type="text" name="colores_nuevos[]" placeholder="Ej: fucsia" required style="padding: 4px; font-size: 11px;">
        <button type="button" onclick="eliminarColor(this)" style="background: #ff4d4d; border: none; color: white; padding: 0 8px; border-radius: 3px; cursor: pointer;">✕</button>
    </div>
</template>

<template id="template-fila">
    <div class="fila-material" style="display: flex; gap: 5px; margin-bottom: 4px;">
        <select name="material_ids[]" style="padding: 4px; font-size: 11px; flex: 2;">
            <option value="">Seleccionar...</option>
            {% for mat in materiales %}
                <option value="{{ mat.id_mmtp }}">{{ mat.mat_mmtp }}</option>
            {% endfor %}
        </select>
        <input type="number" name="cantidades[]" placeholder="Cant." style="padding: 4px; font-size: 11px; flex: 1;" step="0.01">
        <button type="button" onclick="eliminarFila(this)" style="background: #ff4d4d; border: none; color: white; padding: 0 8px; border-radius: 3px; cursor: pointer;">✕</button>
    </div>
</template>

<script>
    function agregarColor() {
        document.getElementById('contenedor-colores').appendChild(document.getElementById('template-color').content.cloneNode(true));
    }
    function eliminarColor(b) {
        if (document.querySelectorAll('.fila-color').length > 1) b.parentElement.remove();
    }
    function agregarFila() {
        document.getElementById('contenedor-materiales').appendChild(document.getElementById('template-fila').content.cloneNode(true));
    }
    function eliminarFila(b) {
        if (document.querySelectorAll('.fila-material').length > 1) b.parentElement.remove();
    }
</script>
{% endblock %}
