{% extends 'base.html' %}

{% block content %}

<div class="page">

    <!-- TITULO -->
    <div class="page-header">
        <h3>Crear Cliente</h3>
    </div>

    <!-- CARD -->
    <div class="form-card">

        <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nom_clien">
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" name="dir_clien">
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="tel_clien">
        </div>

        <div class="form-group">
            <label>Correo</label>
            <input type="email" name="correo_clien">
        </div>

        <div class="form-group">
            <label>Usuario</label>
            <select name="id_usuario_fk_clien">
                {% for usuario in usuarios %}
                <option value="{{ usuario.id_usuario }}">
                    {{ usuario.username }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Guardar</button>
        </div>

        </form>

    </div>

</div>

{% endblock %}
