{% block content %}

<style>
    body{
        background: #f4f4f6;
    }

    .perfil-card{
        max-width: 950px;
        margin: 40px auto;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,.1);
    }

    .perfil-header{
        background: linear-gradient(135deg,#5d0f2d,#7e1a3f,#9a2d58);
        padding: 30px 40px 50px 40px;
        text-align: center;
        color: white;
        position: relative;
    }

    .btn-volver{
        position: absolute;
        left: 30px;
        top: 25px;
        background: rgba(255,255,255,.15);
        border: 1px solid rgba(255,255,255,.3);
        color: white;
        padding: 10px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: .3s;
    }

    .btn-volver:hover{
        background: rgba(255,255,255,.3);
    }

    .foto-perfil{
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: white;
        margin: auto;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 5px solid rgba(255,255,255,.3);
        font-size: 60px;
        color: #7e1a3f;
    }

    .perfil-header h2{
        margin-top: 20px;
        margin-bottom: 5px;
        font-size: 30px;
    }

    .perfil-header p{
        margin: 0;
        font-size: 14px;
        opacity: .9;
    }

    .contenido{
        padding: 40px;
    }

    .form-grid{
        display: grid;
        grid-template-columns: repeat(2,1fr);
        gap: 30px;
    }

    .form-group{
        display: flex;
        flex-direction: column;
    }

    label{
        color:#7e1a3f;
        font-size:12px;
        font-weight:bold;
        text-transform:uppercase;
        margin-bottom:8px;
    }

    .input-style{
        width:100%;
        padding:14px 18px;
        border:1px solid #ddd;
        border-radius:12px;
        background:#fafafa;
        font-size:14px;
        transition:.3s;
        box-sizing:border-box;
    }

    .input-style:focus{
        outline:none;
        border-color:#7e1a3f;
        background:white;
    }

    .botones{
        margin-top:40px;
        text-align:center;
    }

    .btn-guardar{
        background:#7e1a3f;
        color:white;
        border:none;
        padding:15px 55px;
        border-radius:12px;
        font-size:14px;
        font-weight:bold;
        cursor:pointer;
        transition:.3s;
    }

    .btn-guardar:hover{
        background:#5d0f2d;
    }

    @media(max-width:768px){

        .form-grid{
            grid-template-columns:1fr;
        }

        .btn-volver{
            position: static;
            margin-bottom: 20px;
        }

    }
</style>


<div class="perfil-card">

    <div class="perfil-header">

        <button type="button"
                class="btn-volver"
                onclick="volverPagina()">
            ← Volver
        </button>

        <div class="foto-perfil">
            👤
        </div>

        <h2>{{ cliente.nom_clien }}</h2>
        <p>Cliente Luxy Fashion</p>

    </div>


    <div class="contenido">

        <form method="POST">
            {% csrf_token %}

            <div class="form-grid">

                <div class="form-group">
                    <label>Nombre Completo</label>

                    <input type="text"
                           name="nom_clien"
                           value="{{ cliente.nom_clien }}"
                           class="input-style"
                           required>
                </div>


                <div class="form-group">
                    <label>Correo Electrónico</label>

                    <input type="email"
                           name="correo_clien"
                           value="{{ cliente.correo_clien }}"
                           class="input-style"
                           required>
                </div>


                <div class="form-group">
                    <label>Teléfono</label>

                    <input type="text"
                           name="tel_clien"
                           value="{{ cliente.tel_clien }}"
                           class="input-style"
                           required>
                </div>


                <div class="form-group">
                    <label>Dirección</label>

                    <input type="text"
                           name="dir_clien"
                           value="{{ cliente.dir_clien }}"
                           class="input-style"
                           required>
                </div>

            </div>


            <div class="botones">

                <button type="submit" class="btn-guardar">
                    ACTUALIZAR INFORMACIÓN
                </button>

            </div>

        </form>

    </div>

</div>


<script>

    function volverPagina(){
        window.history.back();
    }

</script>

{% endblock %}
