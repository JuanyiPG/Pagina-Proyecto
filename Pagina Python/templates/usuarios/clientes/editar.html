{% extends 'usuarios/base.html' %}

{% block content %}

<div class="page">

    <div class="page-header">
        <h3>Editar Cliente</h3>
    </div>

    <div class="form-card">

        <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nom_clien" value="{{ cliente.nom_clien }}">
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" name="dir_clien" value="{{ cliente.dir_clien }}">
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="tel_clien" value="{{ cliente.tel_clien }}">
        </div>

        <div class="form-group">
            <label>Correo</label>
            <input type="email" name="correo_clien" value="{{ cliente.correo_clien }}">
        </div>

        <div class="form-group">
            <label>Usuario</label>
            <select name="id_usuario_fk">
                {% for usuario in usuarios %}
                <option value="{{ usuario.id_usuario }}"
                {% if usuario.id_usuario == cliente.id_usuario_fk_id %}
                selected
                {% endif %}
                >
                {{ usuario.username }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Actualizar</button>
            <a href="{% url 'usuarios:lista_clientes' %}" class="btn-cancel">Cancelar</a>
        </div>

        </form>

    </div>

</div>

{% endblock %}
