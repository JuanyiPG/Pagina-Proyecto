
{% block content %}
<style>
    :root {
        --luxy-vinotinto: #6b0d24;
        --luxy-vinotinto-hover: #540a1c;
    }

    .perfil-card {
        max-width: 850px;
        margin: 2rem auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    .header-perfil {
        background: var(--luxy-vinotinto);
        color: white;
        padding: 30px;
        text-align: center;
    }

    .form-body {
        padding: 40px;
    }

    .section-title {
        font-size: 1.1rem;
        color: var(--luxy-vinotinto);
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
        margin-bottom: 25px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .grid-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 40px;
    }

    .campo-completo {
        grid-column: span 2;
    }

    .luxy-label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        color: #555;
    }

    .luxy-input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        transition: all 0.3s ease;
    }

    .luxy-input:focus {
        border-color: var(--luxy-vinotinto);
        box-shadow: 0 0 0 3px rgba(107, 13, 36, 0.1);
        outline: none;
    }

    .btns-perfil {
        display: flex;
        justify-content: center;
        gap: 20px;
        border-top: 1px solid #eee;
        padding-top: 30px;
    }

    .btn-save {
        background: var(--luxy-vinotinto);
        color: white;
        border: none;
        padding: 12px 45px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-save:hover {
        background: var(--luxy-vinotinto-hover);
        transform: translateY(-2px);
    }

    .btn-cancel {
        background: #f3f4f6;
        color: #4b5563;
        text-decoration: none;
        padding: 12px 45px;
        border-radius: 6px;
        font-weight: bold;
    }
</style>

<div class="perfil-card">
    <div class="header-perfil">
        <h2 style="margin:0;">Configuración de Perfil</h2>
        <p style="margin: 10px 0 0; opacity: 0.8;">Mantén tus datos actualizados para una mejor experiencia</p>
    </div>

    <form method="POST" class="form-body">
        {% csrf_token %}

        <div class="section-title">Información Personal</div>
        <div class="grid-form">
            <div>
                <label class="luxy-label">Nombre Completo</label>
                <input type="text" name="nombre" value="{{ cliente.nom_clien }}" class="luxy-input" required>
            </div>
            <div>
                <label class="luxy-label">Correo Electrónico</label>
                <input type="email" name="correo" value="{{ cliente.correo_clien }}" class="luxy-input" required>
            </div>
            <div>
                <label class="luxy-label">Teléfono</label>
                <input type="text" name="telefono" value="{{ cliente.tel_clien }}" class="luxy-input" required>
            </div>
            <div>
                <label class="luxy-label">Dirección</label>
                <input type="text" name="direccion" value="{{ cliente.dir_clien }}" class="luxy-input" required>
            </div>
        </div>

        <div class="section-title">Credenciales de Acceso</div>
        <div class="grid-form">
            <div>
                <label class="luxy-label">Nombre de Usuario</label>
                <input type="text" name="username" value="{{ usuario.username }}" class="luxy-input" required>
            </div>
            <div>
                <label class="luxy-label">Nueva Contraseña</label>
                <input type="password" name="contrasena" class="luxy-input" placeholder="••••••••">
                <small style="color: #999;">Dejar vacío para mantener la actual.</small>
            </div>
        </div>

        <div class="btns-perfil">
            <a href="{% url 'ventas:lista_pedido_e' %}" class="btn-cancel">CANCELAR</a>
            <button type="submit" class="btn-save">ACTUALIZAR PERFIL</button>
        </div>
    </form>
</div>
{% endblock %}
