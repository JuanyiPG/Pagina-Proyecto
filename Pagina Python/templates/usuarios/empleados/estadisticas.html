{% extends 'base.html' %}

{% block content %}

<div class="main-content">
<style>
    :root {
        --vino: #800020;
        --gris: #f4f6f9;
        --blanco: #ffffff;
    }

    body {
        background: var(--gris) !important;
    }

    .dashboard {
        padding: 40px;
    }

    .titulo {
        margin-bottom: 30px;
    }

    .titulo h2 {
        color: var(--vino);
        margin: 0;
    }

    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
    }

    .card {
        background: var(--blanco);
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        transition: transform 0.2s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card h3 {
        color: #555;
        margin-bottom: 10px;
    }

    .card p {
        font-size: 30px;
        font-weight: bold;
        color: var(--vino);
    }

    .graficas {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
    }

    .grafica {
        background: var(--blanco);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .grafica h3 {
        text-align: center;
        margin-bottom: 15px;
        color: #444;
    }

    canvas {
        width: 100% !important;
        height: 280px !important;
    }
</style>

<div class="dashboard">

    <div class="titulo">
        <h2>Estadisticas del sistema</h2>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Empleados</h3>
            <p>{{ total_empleados }}</p>
        </div>

        <div class="card">
            <h3>Clientes</h3>
            <p>{{ total_clientes }}</p>
        </div>

        <div class="card">
            <h3>Productos</h3>
            <p>{{ total_productos }}</p>
        </div>

        <div class="card">
            <h3>Proveedores</h3>
            <p>{{ total_proveedores }}</p>
        </div>
    </div>

    <!-- GRÁFICAS -->
    <div class="graficas">

        <div class="grafica">
            <h3 style="text-align:center;">Gráfico de Torta</h3>
            <canvas id="torta"></canvas>
        </div>

        <div class="grafica">
            <h3 style="text-align:center;">Gráfico Lineal</h3>
            <canvas id="linea"></canvas>
        </div>

    </div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const empleados = {{ total_empleados }};
    const clientes = {{ total_clientes }};
    const productos = {{ total_productos }};
    const proveedores = {{ total_proveedores }};


    new Chart(document.getElementById('torta'), {
        type: 'pie',
        data: {
            labels: ['Empleados', 'Clientes', 'Productos', 'Proveedores'],
            datasets: [{
                data: [empleados, clientes, productos, proveedores],
                backgroundColor: [
                    '#800020',
                    '#B87333',
                    '#64093d',
                    '#a8325e'
                ]
            }]
        }
    });


    new Chart(document.getElementById('linea'), {
        type: 'line',
        data: {
            labels: ['Empleados', 'Clientes', 'Productos', 'Proveedores'],
            datasets: [{
                label: 'Cantidad',
                data: [empleados, clientes, productos, proveedores],
                borderColor: '#800020',
                backgroundColor: 'rgba(128,0,32,0.2)',
                tension: 0.4,
                fill: true
            }]
        }
    });
</script>

{% endblock %}
