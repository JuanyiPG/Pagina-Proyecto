{% extends 'base.html' %}
{% block content %}

<div class="main-content">
    <div class="container-wide" style="max-width: 700px;">
        
        <h2 style="color: #6a0f2e; margin-bottom: 25px; text-align: center;">
             Editar Empleado
        </h2>
        
        <div class="form-card">
            <form method="POST">
                {% csrf_token %}

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Nombre</label>
                    <input type="text" name="nom_emple" value="{{ empleado.nom_emple }}" required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" name="tel_emple" value="{{ empleado.tel_emple }}" required>
                    </div>

                    <div class="form-group">
                        <label>Correo</label>
                        <input type="email" name="correo_emple" value="{{ empleado.correo_emple }}" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>Dirección</label>
                    <input type="text" name="dir_emple" value="{{ empleado.dir_emple }}" required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>RH</label>
                        <input type="text" name="rh_emple" value="{{ empleado.rh_emple }}" required>
                    </div>

                    <div class="form-group">
                        <label>Estado</label>
                        <input type="text" name="estado_emple" value="{{ empleado.estado_emple }}" required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Fecha Nacimiento</label>
                        <input type="date" name="fecha_naci_emple" value="{{ empleado.fecha_naci_emple|date:'Y-m-d' }}" required>
                    </div>

                    <div class="form-group">
                        <label>Fecha Ingreso</label>
                        <input type="date" name="fecha_ing_emple" value="{{ empleado.fecha_ing_emple|date:'Y-m-d' }}" required>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Tipo Identificación</label>
                        <input type="text" name="tipo_ident" value="{{ empleado.tipo_ident }}" required>
                    </div>

                    <div class="form-group">
                        <label>Número Identificación</label>
                        <input type="text" name="num_ident" value="{{ empleado.num_ident }}" required>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>Salario</label>
                    <input type="text" name="salari_emple" value="{{ empleado.salari_emple }}" required>
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>Usuario</label>
                    <select name="id_usuario_fk_emple" required>
                        {% for usuario in usuarios %}
                        <option value="{{ usuario.id_usuario }}"
                        {% if usuario.id_usuario == empleado.id_usuario_fk_emple %}
                        selected
                        {% endif %}
                        >
                        {{ usuario.username }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 12px;">
                    <button type="submit" class="btn-save">Actualizar</button>
                    <a href="{% url 'usuarios:lista_empleados' %}" 
                       style="text-align: center; color: #666; text-decoration: none; font-size: 14px;">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
