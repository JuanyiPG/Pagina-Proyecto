{% extends 'base.html' %}

{% block content %}
<div class="main-content" style="margin-left: 0; padding: 0px 30px 30px 30px;">
    <style>
        .photo-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .profile-circle {
            width: 160px; height: 160px; border-radius: 50%; border: 3px dashed #7e1a3f;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            overflow: hidden; background: #fdfafb; transition: 0.3s;
        }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        .form-card { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input[readonly] { background-color: #f9f9f9 !important; color: #666 !important; cursor: not-allowed; border: 1px solid #eee !important; }
        .input-style { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 12px; color: #7e1a3f; text-transform: uppercase; }
        .credential-box { grid-column: span 3; margin-top: 20px; padding: 20px; background: #fdfafb; border-radius: 12px; border: 1px solid #7e1a3f30; }
    </style>

    <div class="container-wide">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-left: 6px solid #6e0a32; padding-left: 20px;">
            <div>
                <h2 style="font-size: 22px; color: #333; margin:0;">Editar Perfil de Empleado</h2>
                <small style="color: #64093d;">Luxy Fashion - Gestión de Personal</small>
            </div>
            <a href="{% url 'usuarios:lista_empleados' %}" style="text-decoration: none; color: #7e1a3f; font-weight: bold; font-size: 13px;">← Volver</a>
        </div>

        <div class="form-card">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="photo-container">
                    <label for="id_foto" class="profile-circle">
                        {% if empleado.foto_perfil %}
                            <img id="preview" src="{{ empleado.foto_perfil.url }}">
                        {% else %}
                            <span style="font-size: 50px; color: #7e1a3f;">+</span>
                            <img id="preview" src="" style="display:none;">
                        {% endif %}
                    </label>
                    <input type="file" name="foto_perfil" id="id_foto" hidden accept="image/*" required>
                    <p style="font-size: 10px; color: #7e1a3f; margin-top: 8px; font-weight: bold;">CAMBIAR FOTO</p>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Identificación</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" name="tipo_ident" value="{{ empleado.tipo_ident }}" readonly class="input-style" style="width: 80px;">
                            <input type="text" name="num_ident" value="{{ empleado.num_ident }}" readonly class="input-style" style="flex:1;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" name="nom_emple" value="{{ empleado.nom_emple }}" required class="input-style">
                    </div>

                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" name="correo_emple" value="{{ empleado.correo_emple }}" required class="input-style">
                    </div>

                    <div class="form-group">
                        <label>RH</label>
                        <input type="text" name="rh_emple" value="{{ empleado.rh_emple }}" readonly class="input-style">
                    </div>

                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="text" name="fecha_naci_emple" value="{{ empleado.fecha_naci_emple|date:'Y-m-d' }}" readonly class="input-style">
                    </div>

                    <div class="form-group">
                        <label>Fecha Ingreso</label>
                        <input type="date" name="fecha_ing_emple" value="{{ empleado.fecha_ing_emple|date:'Y-m-d' }}" required class="input-style">
                    </div>

                    <div class="form-group">
                        <label>Salario ($)</label>
                        <input type="number" name="salari_emple" step="0.01" value="{{ empleado.salari_emple|stringformat:'.2f' }}" required class="input-style">
                    </div>

                    <div class="form-group">
                        <label>Estado Laboral</label>
                        <select name="estado_emple" class="input-style">
                            <option value="Activo" {% if empleado.estado_emple == 'Activo' %}selected{% endif %}>Activo</option>
                            <option value="Inactivo" {% if empleado.estado_emple == 'Inactivo' %}selected{% endif %}>Inactivo</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" name="tel_emple" value="{{ empleado.tel_emple }}" required class="input-style">
                    </div>

                    <div class="form-group" style="grid-column: span 3;">
                        <label>Dirección de Residencia</label>
                        <input type="text" name="dir_emple" value="{{ empleado.dir_emple }}" required class="input-style">
                    </div>

                    <div class="credential-box">
                        <p style="color: #7e1a3f; font-size: 14px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
                            <span>🔐</span> CREDENCIALES DE ACCESO
                        </p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label style="color: #666;">Usuario</label>
                                <input type="text" name="username" value="{{ empleado.id_usuario_fk.username }}" class="input-style" style="border: 1px solid #7e1a3f50;">
                            </div>
                            <div class="form-group">
                                <label style="color: #666;">Nueva Contraseña</label>
                                <input type="password" name="password" placeholder="Dejar en blanco para no cambiar" class="input-style" style="border: 1px solid #7e1a3f50;">
                                <small style="color: #999; font-size: 10px;">* La contraseña actual está encriptada y no se puede mostrar.</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 30px; text-align: center;">
                    <button type="submit" style="background: #7e1a3f; color: white; border: none; padding: 12px 60px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">
                        ACTUALIZAR INFORMACIÓN
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('id_foto').onchange = function(evt) {
        const [file] = this.files;
        if (file) {
            document.getElementById('preview').src = URL.createObjectURL(file);
            document.getElementById('preview').style.display = 'block';
        }
    };
</script>
{% endblock %}
