{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Luxy Fashion</title>
<style>
    .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

.card h3 {
    color: #800020;
    margin-bottom: 10px;
}

.card p {
    font-size: 28px;
    font-weight: bold;
    color: #333;
}
</style>

<link rel="stylesheet" href="{% static 'css/formularios/estilo.css' %}">

</head>

<body>

<!-- SIDEBAR -->
<nav class="sidebar">
    <h1>Luxy Fashion</h1>
        
    <div class="menu">
    <a href="{}" style="display: flex; align-items: center; gap: 8px; text-decoration: none; color: #f9f7f7;">
        
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor"
            class="bi bi-person-circle perfil-icon" viewBox="0 0 16 16">
            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
            <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
        </svg>

        <span class="perfil-texto">Mi perfil</span>
    </a>
        <a href="{% url 'ventas:lista_producto_admin' %}">Productos</a>
        <a href="{% url 'inventario:lista_provee' %}">Proveedores</a>
        <a href="{% url 'inventario:lista_mmtp' %}">Materia Prima</a>
        <a href="{% url 'ventas:lista_abono' %}">abonos</a>


    </div>

    <div style="position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center;">
        <form action="{% url 'usuarios:logout' %}" method="POST">
            {% csrf_token %}
            <button type="submit"
                style="
                    background: linear-gradient(135deg, #800020, #6a0f2e);
                    border: none;
                    color: white;
                    padding: 12px 25px;
                    border-radius: 10px;
                    font-weight: bold;
                    letter-spacing: 1px;
                    cursor: pointer;
                    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
                    transition: all 0.3s ease;
                "
                onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 10px 20px rgba(0,0,0,0.3)'"
                onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 6px 15px rgba(0,0,0,0.2)'"
            >
                ⏻ Cerrar sesión
            </button>
        </form>
    </div>
</nav>


<div class="main-content">

    
    <div class="header">
        <h2>Consola de Empleados </h2>
        <div class="user">
                <a herf="{% url 'usuarios:lista_roles' %}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                    <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                    </svg>
                </a>
        </div>
        <div class="stats">
    </div>


</div>



<hr>

<script>
    if (window.history.replaceState) {
        window.history.replaceState(null, null, window.location.href);
    }
</script>
{% block content %}
{% endblock %}

</body>
</html>
