{% extends 'base.html' %}

{% block content %}
<div class="main-content">
<style>
    :root {
        --luxy-burgundy: #800020;
        --luxy-copper: #6e0a32;
        --luxy-hazelnut: #64093d;
        --luxy-cream: #F5F5F5;
    }

    .table-container {
        margin: 2rem auto;
        padding: 1.5rem;
        background-color: white;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .title-section {
        color: var(--luxy-burgundy);
        border-left: 6px solid var(--luxy-copper);
        padding-left: 20px;
        margin-bottom: 30px;
    }

    .custom-table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 8px 8px 0 0;
    }

    .custom-table thead {
        background-color: var(--luxy-burgundy);
        color: white;
    }

    .custom-table th {
        padding: 15px;
        text-align: left;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1.2px;
    }

    .custom-table td {
        padding: 14px 15px;
        border-bottom: 1px solid #f0f0f0;
        color: #333;
        font-size: 0.95rem;
    }

    .custom-table tbody tr:hover {
        background-color: rgba(184, 115, 51, 0.08); 
        transition: background-color 0.2s ease;
    }

    .monto-destacado {
        font-weight: bold;
        color: var(--luxy-burgundy);
    }

    .metodo-tag {
        background-color: var(--luxy-cream);
        color: var(--luxy-hazelnut);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.85rem;
        border: 1px solid #e0e0e0;
    }
</style>

<div class="table-container">
    <div class="title-section">
        <h2 style="margin:0;">Gestion de Roles</h2>
        <small style="color: var(--luxy-hazelnut);">Registro detallado de los roles</small>
    </div>
        
        <div class="form-card" style="margin-bottom: 40px;">
            <form method="POST" action="{% url 'usuarios:crear_rol' %}">
                {% csrf_token %}
                <div class="form-grid" style="grid-template-columns: 1fr;">
                    <div class="form-group">
                        <label>Nombre del Rol</label>
                        <input type="text" name="nom_rol" placeholder="Ej: Administrador, Vendedor, Contador..." required>
                    </div>
                </div>
                <button type="submit" class="btn-save" style="width: 100%; margin-top: 15px;"> Guardar Rol</button>
            </form>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 30px;">

        <div class="table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="font-size: 18px; margin: 0;">Roles del Sistema</h3>
                
                <div style="position: relative; width: 300px;">
                    <input type="text" id="searchRol" placeholder=" Buscar rol..." 
                           style="width: 100%; padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none;">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table-inventory" id="rolesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre del Rol</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for rol in roles %}
                        <tr>
                            <td>{{ rol.id_rol }}</td>
                            <td class="role-name"><strong>{{ rol.nom_rol }}</strong></td>
                            <td style="display: flex; gap: 10px;">
                                <a href="{% url 'usuarios:editar_rol' id=rol.id_rol %}" class="edit" style="color: #2d6cdf; font-weight: bold; text-decoration: none;">Editar</a>
                                <a href="{% url 'usuarios:eliminar_rol' id=rol.id_rol %}" class="delete" style="color: #d33; font-weight: bold; text-decoration: none;" onclick="return confirm('¿Seguro que quieres eliminar este rol?')">Borrar</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr id="noResultsRow">
                            <td colspan="3" style="text-align: center; padding: 20px; color: #999;">No hay roles creados.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('searchRol').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#rolesTable tbody tr:not(#noResultsRow)');
        
        rows.forEach(row => {
            let roleName = row.querySelector('.role-name').textContent.toLowerCase();
            row.style.display = roleName.includes(filter) ? "" : "none";
        });
    });
</script>
{% endblock %}
