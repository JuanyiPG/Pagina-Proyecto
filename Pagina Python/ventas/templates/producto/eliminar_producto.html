{% block content %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxyFashion | Confirmar Eliminación</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --error-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .delete-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .icon-warning {
            font-size: 50px;
            color: var(--error-color);
            margin-bottom: 20px;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-confirm {
            background-color: var(--error-color);
            color: white;
        }

        .btn-cancel {
            background-color: #eee;
            color: #333;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .product-name {
            font-weight: bold;
            color: var(--primary-color);
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
    <div class="delete-card">
        <div class="icon-warning">⚠️</div>
        <h2>¿Estás seguro?</h2>
        <p>
            Estás a punto de eliminar permanentemente el producto:
            <span class="product-name">"{{ producto.nom_produc }}"</span>
        </p>

        <form action="{% url 'ventas:eliminar_producto' producto.id_produc %}" method="POST">
            {% csrf_token %}
            <div class="btn-group">
                <a href="{% url 'ventas:lista_product' %}" class="btn btn-cancel">Cancelar</a>
                <button type="submit" class="btn btn-confirm">Sí, Eliminar</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>

{% endblock %}
