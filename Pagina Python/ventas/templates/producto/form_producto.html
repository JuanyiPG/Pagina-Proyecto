<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxyFashion | Registro de Producto</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e67e22;
            --error-color: #e74c3c;
            --success-color: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Mensaje de Error */
        .error-msg {
            background-color: #fdeaea;
            color: var(--error-color);
            padding: 12px;
            border-left: 5px solid var(--error-color);
            margin-bottom: 20px;
            border-radius: 4px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"], 
        textarea, 
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
            outline: none;
        }

        /* Estilo para el input de imagen */
        input[type="file"] {
            background: #f1f1f1;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .preview-container {
            margin-top: 15px;
            text-align: center;
            border: 2px dashed #ddd;
            padding: 10px;
            border-radius: 8px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #img-preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 6px;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #1a252f;
        }

        textarea {
            resize: vertical;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>LuxyFashion</h2>
    
    {% if error %}
    <div class="error-msg">
        {{ error }}
    </div>
    {% endif %}

    <form action="{% url 'ventas:form_producto' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label for="nom_produc">Nombre del Producto</label>
            <input type="text" id="nom_produc" name="nom_produc" required placeholder="Ej. Chaqueta de Cuero">
        </div>

        <div class="form-group">
            <label for="cat_produc">Categoría</label>
            <input type="text" id="cat_produc" name="cat_produc" placeholder="Ej. Urbana, Formal, Deporte">
        </div>

        <div class="form-group">
            <label for="estado_produc">Estado</label>
            <select id="estado_produc" name="estado_produc">
                <option value="Nuevo">Nuevo</option>
                <option value="En Stock">En Stock</option>
                <option value="Agotado">Agotado</option>
            </select>
        </div>

        <div class="form-group">
            <label for="desc_produc">Descripción Corta</label>
            <textarea id="desc_produc" name="desc_produc" rows="3" placeholder="Detalles de materiales, talla..."></textarea>
        </div>

        <div class="form-group">
            <label for="imagen_produc">Fotografía del Producto</label>
            <input type="file" id="imagen_produc" name="imagen_produc" accept="image/*" required onchange="mostrarVistaPrevia(event)">
            
            <div class="preview-container">
                <p id="placeholder-text" style="color: #999; font-size: 0.9em;">No se ha seleccionado imagen</p>
                <img id="img-preview" src="#" alt="Vista previa">
            </div>
        </div>

        <button type="submit" class="btn-submit">REGISTRAR PRENDA</button>
    </form>
</div>

<script>
    function mostrarVistaPrevia(event) {
        const reader = new FileReader();
        const output = document.getElementById('img-preview');
        const placeholder = document.getElementById('placeholder-text');

        reader.onload = function() {
            output.src = reader.result;
            output.style.display = 'block';
            placeholder.style.display = 'none';
        }
        
        if(event.target.files[0]) {
            reader.readAsDataURL(event.target.files[0]);
        }
    }
</script>

</body>
</html>
